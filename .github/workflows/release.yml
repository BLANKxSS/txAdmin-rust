name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.check.outputs.exists == 'false'
        env:
          TX_VERSION: ${{ steps.version.outputs.version }}
        run: npm run build

      - name: Package release zip
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p staging/txAdmin-rust
          cp -r dist staging/txAdmin-rust/dist
          cp -r rust-plugins staging/txAdmin-rust/rust-plugins
          cp README.md LICENSE start-txadmin.example.ps1 staging/txAdmin-rust/
          cd staging && zip -qr "../txAdmin-rust-v${{ steps.version.outputs.version }}.zip" txAdmin-rust

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: txAdmin for Rust v${{ steps.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: txAdmin-rust-v${{ steps.version.outputs.version }}.zip
          body: |
            Full-featured web panel to manage & monitor your Rust dedicated server.

            **Install:** download the zip below, extract, edit `start-txadmin.example.ps1`
            (paths + admin account), rename it to `start-txadmin.ps1`, and run it.
            Requires Node.js 22+ and a Rust dedicated server with Oxide/uMod.
            See the [README](https://github.com/${{ github.repository }}#install) for details.
